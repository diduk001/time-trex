{% extends "base.html" %}
{% block title %}Register · Time T-Rex{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h1 class="h3 mb-3">Create an account</h1>
    <form method="post" action="{{ url_for('auth.register') }}">
      <div class="mb-3">
        <label class="form-label">Login</label>
        <input class="form-control" name="login" value="{{ login|default('') }}" minlength="3" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" minlength="8" required>
      </div>
      <button class="btn btn-primary" type="submit">Register</button>
      <a class="btn btn-link" href="{{ url_for('auth.login') }}">I already have an account</a>
    </form>
  </div>
</div>
{% endblock %}
