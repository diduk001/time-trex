services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    volumes:
      - backend_data:/app/instance
    environment:
      APP_CONFIG: production
      SECRET_KEY: ${BACKEND_SECRET_KEY:-change-me}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-too}
      DATABASE_URI: sqlite:////app/instance/trex.db
      JWT_ACCESS_TOKEN_EXPIRES: ${JWT_ACCESS_TOKEN_EXPIRES:-86400}
    command: >
      sh -c "uv run flask --app main:app db upgrade &&
             uv run flask --app main:app run --host 0.0.0.0 --port 5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_CONFIG: production
      SECRET_KEY: ${FRONTEND_SECRET_KEY:-change-me}
      BACKEND_URL: http://backend:5000
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-10}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_data:
